<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Task Manager Dashboard</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <header>
    <h1>Personal Task Manager Dashboard</h1>
    <p class="subtitle">Stay organized and productive</p>
    <div class="theme-toggle">
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
        <span class="theme-icon sun">☀️</span>
        <span class="theme-icon moon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <!-- Motivational Quote Section -->
    <section id="quote-section" class="quote-container">
      <p id="quote-text" class="quote-text">Loading inspiration...</p>
      <p id="quote-author" class="quote-author">— Anonymous</p>
    </section>

    <!-- Statistics Section -->
    <section id="stats-section" class="stats-container">
      <div class="stat-card">
        <h3>Total Tasks</h3>
        <p class="stat-number" id="total-tasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Completed</h3>
        <p class="stat-number" id="completed-tasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <p class="stat-number" id="pending-tasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Completion %</h3>
        <p class="stat-number" id="completion-percentage">0%</p>
      </div>
    </section>

    <!-- Task Input Form Section -->
    <section id="input-section" class="input-container">
      <h2>Add New Task</h2>
      <form id="task-form">
        <div class="form-group">
          <label for="task-title">Task Title *</label>
          <input
            type="text"
            id="task-title"
            placeholder="Enter task title"
            required
          />
        </div>

        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea
            id="task-description"
            placeholder="Enter task description (optional)"
            rows="3"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>

          <div class="form-group">
            <label for="task-due-date">Due Date</label>
            <input type="date" id="task-due-date" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Add Task</button>
      </form>
    </section>

    <!-- Filters and Search Section -->
    <section id="filter-section" class="filter-container">
      <h2>Manage Tasks</h2>

      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search tasks by title..."
          class="search-input"
        />
      </div>

      <div class="filter-controls">
        <button class="filter-btn active" data-filter="all">All Tasks</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="low">Low Priority</button>
        <button class="filter-btn" data-filter="medium">Medium Priority</button>
        <button class="filter-btn" data-filter="high">High Priority</button>
      </div>

      <div class="sort-controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="created-desc">Newest First</option>
          <option value="created-asc">Oldest First</option>
          <option value="due-date">Due Date</option>
          <option value="priority">Priority</option>
        </select>
      </div>
    </section>

    <!-- Task List Section -->
    <section id="tasks-section" class="tasks-container">
      <h2>Tasks</h2>
      <div id="task-list" class="task-list">
        <p class="empty-state">No tasks yet. Add your first task above!</p>
      </div>
    </section>
  </main>

  <!-- Scroll to Top Button -->
  <button id="scroll-to-top" class="scroll-to-top-btn" aria-label="Scroll to top">
    ↑
  </button>

  <script src="./js/script.js"></script>
</body>
</html>
